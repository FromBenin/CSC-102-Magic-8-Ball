<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic 8 Ball</title>
    <!-- The script tag is the link between html and javascript  It allows the html to call functions
     and thru ids allows the javascript to update the html page-->
    <script src="code.js"></script>
</head>
<body>
    <header>
        <img id="ball" src="Images/magic8ball.jpg" alt="Magic 8 Ball" width="400px" height="300px">
        <!-- The next line displays the answer given by the 8-ball -->
        <p id="answer"></p>
        <!-- Button to shake the Magic 8 Ball -->
        <button onclick="shakeBall()">Shake the Magic 8 Ball</button>
    </header>
</body>
</html>
